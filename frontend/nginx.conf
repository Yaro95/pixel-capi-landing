server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location /css/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /js/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location = / {
        return 302 https://$host/ru/;
    }

    location = /index.html {
        return 301 https://$host/ru/;
    }

    location = /ru {
        return 301 https://$host/ru/;
    }

    location = /uz {
        return 301 https://$host/uz/;
    }

    location /ru/ {
        try_files $uri $uri/ /ru/index.html;
    }

    location /uz/ {
        try_files $uri $uri/ /uz/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
